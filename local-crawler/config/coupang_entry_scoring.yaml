# OEM/사입 셀러 시장 진입 가능성 점수 — threshold·가중치 (수정 시 재시작)

top10_slots: 10

delivery_types:
  general: 90
  seller_rocket: 60
  rocket_growth: 60
  rocket: 30

delivery_aliases:
  일반배송: general
  판매자배송: general
  로켓배송: rocket
  로켓프레시: rocket
  판매자로켓: seller_rocket
  로켓그로스: rocket_growth

rocket_delivery_types:
  - rocket
  - seller_rocket
  - rocket_growth

review_entry:
  thresholds:
    - min_count: 7
      score: 100
      grade: 진입우선
    - min_count: 6
      score: 80
      grade: 양호
    - min_count: 5
      score: 70
      grade: 보통
    - min_count: 4
      score: 60
      grade: 주의
