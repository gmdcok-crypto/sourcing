  premium_min_median: 1000
  diamond_min_median: 700
  gold_min_median: 400
  scores:
    raw_gem: 100
    gold: 75
    diamond: 45
    premium: 20

rocket_penalty:
  bands:
    - max_ratio: 30
      score: 100
    - max_ratio: 50
      score: 80
    - max_ratio: 70
      score: 60
    - max_ratio: 100
      score: 30

rating_quality:
  bands:
    - min_avg: 4.7
      score: 100
    - min_avg: 4.5
      score: 85
    - min_avg: 4.3
      score: 70
    - min_avg: 0
