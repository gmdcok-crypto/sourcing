final_weights:
  review_score: 0.35
  delivery_score: 0.20
  tier_score: 0.25
  rocket_penalty: 0.15
  rating_quality: 0.05

final_grades:
  - min_score: 90
    grade: S
  - min_score: 80
    grade: A
  - min_score: 70
    grade: B
  - min_score: 60
    grade: C
  - min_score: 0
    grade: D

entry_decision:
  recommend_min_final: 80
  recommend_max_rocket_ratio: 55
  recommend_tiers:
    - raw_gem
    - gold
  selective_min_final: 65
  hold_max_final: 65
  hold_tiers:
    - premium
  hold_min_rocket_ratio: 70
