# Gemini + Google Search 트렌드 마켓 스코어 (0~100)

model: gemini-2.5-flash
fallback_models:
  - gemini-2.0-flash
  - gemini-2.5-flash-lite
temperature: 0.1
reference_month: "2026년 5월"
retry_max_attempts: 3
retry_base_delay_sec: 2
keyword_delay_sec: 1.5

weights:
  velocity: 0.30
  viral: 0.30
  conversion: 0.20
  seasonality: 0.20

tiers:
  - min_score: 85
    label: GOLD
  - min_score: 70
    label: SILVER
  - min_score: 55
    label: BRONZE
  - min_score: 0
    label: WATCH
